<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billal Islamic Masjid - Donation Details</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b2d2d; /* Islamic Deep Green */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            border: 2px solid #ffcc00; /* Gold border to match banner */
            padding: 20px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h2 { color: #ffcc00; margin-bottom: 5px; font-size: 1.4rem; }
        h3 { margin-top: 0; font-size: 1rem; color: #ccc; }

        .detail-box {
            background: #ffffff;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .bank-name { color: #f48221; font-size: 1.2rem; display: block; } /* FNB Orange */

        .shop2shop {
            background: #000;
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .close-btn {
            margin-top: 20px;
            padding: 12px 40px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .close-btn:hover { background: #ff0000; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Billal Islamic Masjid</h2>
        <h3>Donation Details</h3>

        <div class="detail-box">
            <span class="bank-name">FNB (First National Bank)</span>
            Account Name: Billal Islamic Community Association<br>
            Account Number: <span style="font-size: 1.3rem;">63060465193</span><br>
            <small>Islamic Gold Business Account</small>
        </div>

        <div style="margin: 10px 0;">
            <p><strong>Shop2Shop Code:</strong></p>
            <div class="shop2shop">1WVZSV</div>
        </div>

        <div class="qr-container">
            <img src="qrshop.jpg" alt="QR Code" style="max-width:120px; width:100%;">
        </div>
        <div class="meter-info">
            <p><i class="fas fa-bolt"></i> <strong>Electric Meter:</strong> 0424778775</p>
        </div>

        <p style="font-size: 0.8rem; color: #aaa;">
            32 Teddington Road, Oakdale, Cape Town
        </p>


        <button class="close-btn" onclick="window.close()">Close Window</button>
    </div>

</body>
</html>
